<style>
        /* Base brutalist resets */
        * { border-radius: 0 !important; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #464554; }
    </style>

<body class="bg-background min-h-screen w-full flex justify-end items-center sm:pr-20 overflow-hidden font-body-md text-body-md text-text-primary antialiased">
<!-- Conjure Extension Pane -->
<div class="w-full sm:w-[380px] h-screen sm:h-[921px] bg-surface border-l border-outline-variant flex flex-col relative shadow-[0_0_40px_rgba(0,0,0,0.5)]">
<!-- TopAppBar (EXT_TERM_V1) -->
<header class="flex h-[40px] items-center px-window-bar-x justify-between shrink-0 bg-background dark:bg-background border-b border-outline-variant w-full absolute top-0 left-0 z-20">
<div class="font-caption text-caption text-text-dim flex items-center whitespace-nowrap overflow-hidden text-ellipsis">
<span class="text-accent-bright font-bold mr-2 tracking-widest">GOAL</span>
<span class="material-symbols-outlined text-[10px] mr-2" data-icon="play_arrow">play_arrow</span>
<span class="truncate">summarize every product page I visit</span>
</div>
<div class="flex items-center gap-2 text-text-dim shrink-0">
<span class="material-symbols-outlined text-[14px] cursor-pointer hover:text-primary transition-colors" data-icon="settings">settings</span>
<span class="material-symbols-outlined text-[14px] cursor-pointer hover:text-primary transition-colors" data-icon="terminal">terminal</span>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 overflow-y-auto pt-[60px] pb-[80px] px-container-padding flex flex-col gap-block-gap">
<!-- AI Clarifying Question -->
<div class="font-body-md text-body-md text-text-primary flex items-start gap-3">
<span class="text-accent-bright mt-1 text-[12px] leading-none">■</span>
<p>How should the summary appear?</p>
</div>
<!-- Option Cards Group -->
<div class="flex flex-col -space-y-[1px]">
<!-- Card 1: Selected -->
<button class="w-full text-left p-4 border border-accent-bright bg-primary-container/10 focus:outline-none flex gap-3 items-start relative group transition-colors z-10">
<span class="text-accent-bright mt-0.5 text-[10px]">■</span>
<div class="flex flex-col gap-1.5">
<span class="font-metadata-key text-metadata-key text-accent-bright uppercase">INLINE BANNER AT TOP OF PAGE</span>
<span class="font-ui-small text-ui-small text-text-primary">Injects a full-width summary block above the site's header</span>
</div>
</button>
<!-- Card 2: Default -->
<button class="w-full text-left p-4 border border-outline-variant hover:bg-surface-container-highest focus:outline-none flex gap-3 items-start relative group transition-colors">
<span class="text-text-dim mt-0.5 text-[10px] group-hover:text-primary transition-colors">□</span>
<div class="flex flex-col gap-1.5">
<span class="font-metadata-key text-metadata-key text-text-dim group-hover:text-primary transition-colors uppercase">FLOATING SIDE NOTE</span>
<span class="font-ui-small text-ui-small text-text-dim group-hover:text-text-primary transition-colors">A sticky card anchored top-right</span>
</div>
</button>
<!-- Card 3: Default -->
<button class="w-full text-left p-4 border border-outline-variant hover:bg-surface-container-highest focus:outline-none flex gap-3 items-start relative group transition-colors">
<span class="text-text-dim mt-0.5 text-[10px] group-hover:text-primary transition-colors">□</span>
<div class="flex flex-col gap-1.5">
<span class="font-metadata-key text-metadata-key text-text-dim group-hover:text-primary transition-colors uppercase">ONLY IN THE CONJURE PANEL</span>
<span class="font-ui-small text-ui-small text-text-dim group-hover:text-text-primary transition-colors">Piped to your active side-panel view</span>
</div>
</button>
</div>
<!-- Custom Input Row -->
<div class="mt-4 flex items-end border-b border-outline-variant pb-1 group focus-within:border-accent-bright transition-colors">
<span class="text-accent-bright mr-3 mb-1 text-[14px] leading-none animate-pulse">▌</span>
<input class="bg-transparent border-none focus:ring-0 text-body-md font-body-md w-full text-text-primary placeholder-text-faint outline-none p-0 focus:outline-none" placeholder="write your own..." type="text"/>
</div>
</main>
<!-- Footer -->
<footer class="absolute bottom-0 left-0 w-full h-[60px] bg-surface-container-lowest dark:bg-surface-container-lowest border-t border-outline-variant flex items-center justify-between px-container-padding z-20">
<div class="font-micro text-micro text-text-faint">v2.4.0-stable</div>
<button class="border border-accent-bright px-3 py-1.5 flex items-center gap-2 group hover:bg-accent-bright/10 transition-colors focus:outline-none focus:ring-1 focus:ring-accent-bright focus:ring-offset-1 focus:ring-offset-surface">
<span class="font-ui-small text-ui-small text-accent-bright tracking-wider uppercase">[ build</span>
<span class="material-symbols-outlined text-[14px] text-accent-bright group-hover:-translate-y-0.5 group-hover:translate-x-0.5 transition-transform" data-icon="arrow_outward">arrow_outward</span>
<span class="font-ui-small text-ui-small text-accent-bright tracking-wider uppercase">]</span>
</button>
</footer>
</div>
