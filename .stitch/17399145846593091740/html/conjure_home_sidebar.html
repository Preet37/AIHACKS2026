<!DOCTYPE html><html class="dark" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Conjure Home</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&amp;family=Silkscreen&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "error": "#ffb4ab",
                        "surface-container-highest": "#34343c",
                        "on-secondary-fixed": "#06006c",
                        "border-hairline": "rgba(240,240,245,0.14)",
                        "on-primary-fixed": "#0c006a",
                        "secondary-fixed": "#e1e0ff",
                        "surface-container-lowest": "#0e0d15",
                        "outline-variant": "#464554",
                        "on-secondary": "#1d1c8c",
                        "on-primary-container": "#150093",
                        "on-surface-variant": "#c7c4d7",
                        "on-secondary-fixed-variant": "#3638a2",
                        "inverse-surface": "#e4e1ec",
                        "inverse-on-surface": "#303038",
                        "on-error": "#690005",
                        "surface-variant": "#34343c",
                        "on-tertiary-fixed-variant": "#6e3900",
                        "surface-dim": "#13131a",
                        "on-primary-fixed-variant": "#342cbd",
                        "text-primary": "#F0F0F5",
                        "secondary": "#c0c1ff",
                        "on-tertiary": "#4d2600",
                        "outline": "#918fa0",
                        "on-tertiary-fixed": "#2f1500",
                        "primary-fixed-dim": "#c2c1ff",
                        "on-primary": "#1900a7",
                        "tertiary-fixed": "#ffdcc3",
                        "surface": "#101026",
                        "primary-fixed": "#e2dfff",
                        "tertiary": "#ffb77d",
                        "on-error-container": "#ffdad6",
                        "text-faint": "#54546E",
                        "on-secondary-container": "#b0b2ff",
                        "text-dim": "#8A8AA4",
                        "tertiary-fixed-dim": "#ffb77d",
                        "on-background": "#e4e1ec",
                        "tertiary-container": "#d57a1d",
                        "on-surface": "#e4e1ec",
                        "surface-container-high": "#2a2931",
                        "on-tertiary-container": "#432100",
                        "surface-container-low": "#1b1b23",
                        "primary": "#c2c1ff",
                        "inverse-primary": "#4d4ad5",
                        "background": "#13131a",
                        "secondary-fixed-dim": "#c0c1ff",
                        "accent-bright": "#ADABFF",
                        "secondary-container": "#393ba5",
                        "error-container": "#93000a",
                        "surface-tint": "#c2c1ff",
                        "primary-container": "#8382ff",
                        "surface-bright": "#393841",
                        "surface-container": "#1f1f27"
                    },
                    "borderRadius": {
                        "DEFAULT": "0px",
                        "lg": "0px",
                        "xl": "0px",
                        "full": "0px"
                    },
                    "spacing": {
                        "window-bar-y": "6px",
                        "item-gap": "12px",
                        "block-gap": "20px",
                        "base": "11px",
                        "container-padding": "22px",
                        "window-bar-x": "10px"
                    },
                    "fontFamily": {
                        "micro": ["JetBrains Mono"],
                        "body-md": ["JetBrains Mono"],
                        "display-lg": ["Silkscreen"],
                        "metadata-key": ["JetBrains Mono"],
                        "ui-small": ["JetBrains Mono"],
                        "caption": ["JetBrains Mono"],
                        "display-sm": ["Silkscreen"],
                        "wordmark": ["Silkscreen"]
                    },
                    "fontSize": {
                        "micro": ["10px", { "lineHeight": "1.0", "fontWeight": "400" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "display-lg": ["22px", { "lineHeight": "1.2", "fontWeight": "400" }],
                        "metadata-key": ["13px", { "lineHeight": "1.0", "letterSpacing": "0.14em", "fontWeight": "500" }],
                        "ui-small": ["12px", { "lineHeight": "1.0", "fontWeight": "400" }],
                        "caption": ["11px", { "lineHeight": "1.0", "letterSpacing": "0.1em", "fontWeight": "400" }],
                        "display-sm": ["15px", { "lineHeight": "1.2", "fontWeight": "400" }],
                        "wordmark": ["46px", { "lineHeight": "1.0", "letterSpacing": "1px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        body { background-color: #08080F; color: #F0F0F5; }
        .border-hairline { border-color: rgba(240,240,245,0.14); }
        .accent-color { color: #6C6AF5; }
        .bg-accent { background-color: #6C6AF5; }
        .border-accent { border-color: #6C6AF5; }
        
        /* Terminal Brutalism Specifics */
        .window-bar { border-bottom: 1px solid rgba(240,240,245,0.14); padding: 6px 10px; }
        .pane { border: 1px solid rgba(240,240,245,0.14); }
        
        /* Webkit Scrollbar Styling for Terminal look */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(240,240,245,0.14); }
        ::-webkit-scrollbar-thumb:hover { background: #6C6AF5; }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden flex selection:bg-accent-bright selection:text-surface flex-row-reverse">
<!-- Sidebar Container -->
<aside class="w-[380px] h-full flex flex-col border-hairline bg-[#08080F] relative shrink-0 border-l">
<!-- Top Bar -->
<header class="h-[40px] flex items-center justify-between px-window-bar-x border-b border-hairline shrink-0">
<div class="flex items-center gap-2">
<span class="accent-color">■</span>
<span class="font-metadata-key text-text-primary">conjure</span>
</div>
<div class="flex items-center gap-2 font-caption text-text-dim">
<span class="">[1]</span>
<span class="">[2]</span>
<span class="">[3]</span>
</div>
<div class="font-caption text-text-dim flex items-center gap-1">
                ready <span class="mx-1">·</span> ⌘K
            </div>
</header>
<!-- Scrollable Content Area -->
<div class="flex-1 overflow-y-auto p-0 flex flex-col gap-0">
<!-- Pane 1: MODS -->
<div class="pane bg-surface m-[10px] mb-0">
<div class="window-bar flex justify-between items-center">
<span class="font-caption text-text-primary">MODS <span class="text-text-dim">· 3</span></span>
<span class="material-symbols-outlined text-[14px] text-text-dim">remove</span>
</div>
<div class="p-container-padding flex flex-col gap-item-gap font-ui-small">
<div class="flex items-center gap-2 group cursor-pointer hover:bg-[rgba(108,106,245,0.1)] -mx-2 px-2 py-1 transition-colors">
<div class="w-3 h-3 bg-accent border border-accent flex items-center justify-center">
<div class="w-1.5 h-1.5 bg-[#08080F]"></div>
</div>
<span class="text-text-primary">hide shorts</span>
</div>
<div class="flex items-center gap-2 group cursor-pointer hover:bg-[rgba(108,106,245,0.1)] -mx-2 px-2 py-1 transition-colors">
<div class="w-3 h-3 bg-accent border border-accent flex items-center justify-center">
<div class="w-1.5 h-1.5 bg-[#08080F]"></div>
</div>
<span class="text-text-primary">linkedin follow-up</span>
</div>
<div class="flex items-center gap-2 group cursor-pointer hover:bg-[rgba(108,106,245,0.1)] -mx-2 px-2 py-1 transition-colors">
<div class="w-3 h-3 border border-hairline group-hover:border-accent"></div>
<span class="text-text-dim group-hover:text-text-primary">dark accent css</span>
</div>
</div>
</div>
<!-- Pane 2: RUNS -->
<div class="pane border-accent m-[10px]">
<div class="window-bar border-accent flex justify-between items-center">
<span class="font-caption text-text-primary">RUNS <span class="text-text-dim">· 1 active</span></span>
<span class="material-symbols-outlined text-[14px] text-text-primary">close</span>
</div>
<div class="p-container-padding flex flex-col gap-block-gap">
<!-- Active Run Entry -->
<div class="flex flex-col gap-2">
<div class="flex items-center justify-between font-ui-small">
<div class="flex items-center gap-2">
<span class="accent-color">■</span>
<span class="text-text-primary">linkedin outreach</span>
</div>
<span class="text-text-dim font-micro">2/4</span>
</div>
<!-- Mini Log -->
<div class="pl-4 border-l border-hairline ml-1.5 flex flex-col gap-1 font-micro">
<div class="flex items-center gap-2 text-text-dim">
<span class="">■</span>
<span class="">scrape profile url</span>
</div>
<div class="flex items-center gap-2 text-text-dim">
<span class="">■</span>
<span class="">generate context summary</span>
</div>
<div class="flex items-center gap-2 text-text-primary">
<span class="accent-color animate-pulse" style="opacity: 1;">■</span>
<span class="">draft connection message</span>
</div>
<div class="flex items-center gap-2 text-text-faint">
<span class="">□</span>
<span class="">await user approval</span>
</div>
</div>
</div>
</div>
</div>
</div>
<!-- Bottom Bar (Prompt) -->
<footer class="h-[60px] border-t border-hairline bg-[#08080F] shrink-0 p-3 flex items-center">
<div class="w-full flex items-center border border-hairline bg-surface px-3 py-2 focus-within:border-accent transition-colors">
<span class="text-text-dim mr-2 font-micro">▶</span>
<input class="bg-transparent border-none outline-none text-text-primary font-ui-small w-full placeholder:text-text-faint focus:ring-0 p-0" placeholder="ask or speak to conjure…" type="text">
<div class="flex items-center gap-2 shrink-0 ml-2">
<span class="material-symbols-outlined text-[16px] text-text-dim hover:text-text-primary cursor-pointer transition-colors" data-icon="mic" data-weight="fill" style="font-variation-settings: 'FILL' 1;">mic</span>
<div class="border border-hairline px-1.5 py-0.5 font-micro text-text-dim bg-surface-container-low">⌘K</div>
</div>
</div>
</footer>
</aside>
<!-- Main Canvas Area (Placeholder for Context) -->
<main class="flex-1 bg-[#0a0a14] relative flex items-center justify-center p-8">
<!-- Abstract representation of the user's workspace -->
<div class="w-full h-full border border-hairline border-dashed flex items-center justify-center flex-col gap-4 opacity-20 pointer-events-none">
<div class="font-display-lg text-text-dim tracking-widest">WORKSPACE</div>
<div class="font-micro text-text-faint">Awaiting conjuration...</div>
</div>
</main>
<script>
        // Simple blinking cursor effect for active run
        setInterval(() => {
            const cursor = document.querySelector('.animate-pulse');
            if (cursor) {
                cursor.style.opacity = cursor.style.opacity === '0' ? '1' : '0';
            }
        }, 500);
    </script>


</body></html>
