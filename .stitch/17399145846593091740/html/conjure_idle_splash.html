<style>
        body {
            background-color: #222290;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        
        /* Brutalist Pixel C */
        .pixel-c {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(5, 1fr);
            width: 120px;
            height: 150px;
            gap: 2px;
        }
        
        .pixel-c > div {
            background-color: transparent;
        }
        
        .pixel-c > .fill {
            background-color: #F0F0F5; /* text-primary */
        }
        
        /* C Pattern */
        .c-1, .c-2, .c-3, .c-4 { grid-row: 1; }
        .c-1, .c-5, .c-9, .c-13, .c-17 { grid-column: 1; }
        .c-17, .c-18, .c-19, .c-20 { grid-row: 5; }
        .c-5, .c-9, .c-13 { grid-column: 1; }
        .c-4 { grid-column: 4; grid-row: 2; }
        .c-20 { grid-column: 4; grid-row: 4; }
        
        /* Palette Swatches */
        .swatch-1 { background-color: #08080F; } /* surface-container-lowest approx */
        .swatch-2 { background-color: #101026; } /* surface */
        .swatch-3 { background-color: #8A8AA4; } /* text-dim */
        .swatch-4 { background-color: #F0F0F5; } /* text-primary */
        .swatch-5 { background-color: #6C6AF5; } /* accent primary based on prompt */
        
        /* Blinking Cursor */
        .cursor-blink {
            animation: blink 1s step-end infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col justify-center items-center font-ui-small text-text-primary antialiased">

<div class="fill c-1"></div>

<div class="fill c-3"></div>

<div class="fill c-5"></div>

<div class="c-7"></div>
<div class="c-8"></div>

<div class="c-11"></div>

<div class="c-14"></div>

<div class="fill c-17"></div>
<div class="fill c-18"></div>
<div class="fill c-19"></div>
<div class="fill" style="grid-column: 4; grid-row: 1;"></div>

</div>
</div>
